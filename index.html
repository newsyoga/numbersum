<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Numerology & Name Correction Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        h1 {
            color: #4a5568;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
            flex: 1;
        }
        .form-group.target-group {
            flex: 0 0 120px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }
        input[type="text"], input[type="date"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 5px solid #764ba2;
            display: none;
        }
        .result h3 {
            margin: 0 0 15px 0;
            color: #2d3748;
        }
        .number-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .num-item {
            background: #edf2f7;
            padding: 12px;
            border-radius: 6px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .num-item p {
            margin: 0;
            font-size: 14px;
            color: #4a5568;
            font-weight: 600;
        }
        .num-item span {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: #764ba2;
            margin-top: 5px;
        }
        .suggestion-box {
            background: #ebf8ff;
            border-left: 5px solid #3182ce !important;
        }
        .suggestion-box span {
            color: #2b6cb0;
            font-size: 20px;
            letter-spacing: 1px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Numerology & Correction Tool</h1>
    <div class="subtitle">Calculates everything live as you type</div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter name">
        </div>
        
        <div class="form-group target-group">
            <label for="target">Target (1-9):</label>
            <input type="number" id="target" min="1" max="9" placeholder="E.g. 1">
        </div>
    </div>
    
    <div class="form-group">
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob">
    </div>
    
    <div class="result" id="resultBox">
        <h3 id="greeting">Results</h3>
        <div class="number-grid" id="numberGrid">
            </div>
    </div>
</div>

<script>
    const nameInput = document.getElementById('name');
    const targetInput = document.getElementById('target');
    const dobInput = document.getElementById('dob');
    const resultBox = document.getElementById('resultBox');
    const grid = document.getElementById('numberGrid');
    const greeting = document.getElementById('greeting');

    // Pythagorean Mapping Object for easy lookups
    const pythagoreanValues = {
        1: ['A', 'J', 'S', '1'],
        2: ['B', 'K', 'T', '2'],
        3: ['C', 'L', 'U', '3'],
        4: ['D', 'M', 'V', '4'],
        5: ['E', 'N', 'W', '5'],
        6: ['F', 'O', 'X', '6'],
        7: ['G', 'P', 'Y', '7'],
        8: ['H', 'Q', 'Z', '8'],
        9: ['I', 'R', '9']
    };

    // Track live typing changes across all 3 inputs
    nameInput.addEventListener('input', calculateLiveNumerology);
    targetInput.addEventListener('input', calculateLiveNumerology);
    dobInput.addEventListener('input', calculateLiveNumerology);

    function getSingleDigit(num) {
        while (num > 9) {
            let sum = 0;
            while (num > 0) {
                sum += num % 10;
                num = Math.floor(num / 10);
            }
            num = sum;
        }
        return num;
    }

    function getNameRawSum(inputStr) {
        const upperStr = inputStr.toUpperCase();
        let total = 0;
        
        for (let i = 0; i < upperStr.length; i++) {
            let char = upperStr[i];
            if (char >= '0' && char <= '9') {
                total += parseInt(char, 10);
            } else if (char >= 'A' && char <= 'Z') {
                let code = char.charCodeAt(0) - 64; 
                let val = code % 9 === 0 ? 9 : code % 9;
                total += val;
            }
        }
        return total;
    }

    function calculateLiveNumerology() {
        const name = nameInput.value.trim();
        const targetVal = parseInt(targetInput.value, 10);
        const dobValue = dobInput.value;
        
        if (!name && !dobValue && !targetVal) {
            resultBox.style.display = 'none';
            grid.innerHTML = '';
            return;
        }

        grid.innerHTML = '';

        // 1. Process Name & Target Suggestions
        if (name) {
            greeting.innerText = `Results for: ${name}`;
            const rawSum = getNameRawSum(name);
            const currentNameNum = getSingleDigit(rawSum);
            
            grid.innerHTML += `
                <div class="num-item">
                    <p>Current Name Number</p>
                    <span>${currentNameNum} (Total: ${rawSum})</span>
                </div>
            `;

            // If a valid target number between 1 and 9 is requested
            if (targetVal >= 1 && targetVal <= 9) {
                // Find what value we need to bridge the gap to the target
                let neededValue = 0;
                for (let testVal = 1; testVal <= 9; testVal++) {
                    if (getSingleDigit(rawSum + testVal) === targetVal) {
                        neededValue = testVal;
                        break;
                    }
                }

                if (neededValue > 0 && pythagoreanValues[neededValue]) {
                    const options = pythagoreanValues[neededValue].join(', ');
                    grid.innerHTML += `
                        <div class="num-item suggestion-box">
                            <p>To reach Target ${targetVal}, append one of these letters/numbers:</p>
                            <span>${options}</span>
                        </div>
                    `;
                }
            }
        } else {
            greeting.innerText = `Results`;
        }

        // 2. Process DOB
        if (dobValue) {
            const dateParts = dobValue.split('-'); 
            if (dateParts.length === 3) {
                const day = parseInt(dateParts[2], 10);
                const month = parseInt(dateParts[1], 10);
                const year = parseInt(dateParts[0], 10);

                const mulank = getSingleDigit(day);
                const totalSum = day + month + year;
                const bhagyaank = getSingleDigit(totalSum);

                grid.innerHTML += `
                    <div class="num-item">
                        <p>Mulank (Psychic Number)</p>
                        <span>${mulank}</span>
                    </div>
                    <div class="num-item">
                        <p>Bhagyaank (Destiny Number)</p>
                        <span>${bhagyaank}</span>
                    </div>
                `;
            }
        }

        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
