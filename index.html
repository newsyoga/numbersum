<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Numerology Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #4a5568;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
        }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 5px solid #764ba2;
            display: none;
        }
        .result h3 {
            margin: 0 0 15px 0;
            color: #2d3748;
        }
        .number-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .num-item {
            background: #edf2f7;
            padding: 12px;
            border-radius: 6px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .num-item p {
            margin: 0;
            font-size: 14px;
            color: #4a5568;
            font-weight: 600;
        }
        .num-item span {
            display: block;
            font-size: 26px;
            font-weight: bold;
            color: #764ba2;
            margin-top: 5px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Numerology Calculator</h1>
    <div class="subtitle">Results update instantly as you type</div>
    
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Start typing a name...">
    </div>
    
    <div class="form-group">
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob">
    </div>
    
    <div class="result" id="resultBox">
        <h3 id="greeting">Results</h3>
        <div class="number-grid" id="numberGrid">
            </div>
    </div>
</div>

<script>
    // Elements
    const nameInput = document.getElementById('name');
    const dobInput = document.getElementById('dob');
    const resultBox = document.getElementById('resultBox');
    const grid = document.getElementById('numberGrid');
    const greeting = document.getElementById('greeting');

    // Attach "input" event listeners for real-time tracking
    nameInput.addEventListener('input', calculateLiveNumerology);
    dobInput.addEventListener('input', calculateLiveNumerology);

    // Helper: Reduce any number to single digit (1-9)
    function getSingleDigit(num) {
        while (num > 9) {
            let sum = 0;
            while (num > 0) {
                sum += num % 10;
                num = Math.floor(num / 10);
            }
            num = sum;
        }
        return num;
    }

    // Helper: Alphanumeric conversion logic
    function getNameNumberAlphanumeric(inputStr) {
        const upperStr = inputStr.toUpperCase();
        let total = 0;
        
        for (let i = 0; i < upperStr.length; i++) {
            let char = upperStr[i];
            
            if (char >= '0' && char <= '9') {
                total += parseInt(char, 10);
            } 
            else if (char >= 'A' && char <= 'Z') {
                let code = char.charCodeAt(0) - 64; 
                let val = code % 9 === 0 ? 9 : code % 9;
                total += val;
            }
        }
        return getSingleDigit(total);
    }

    // Main live function
    function calculateLiveNumerology() {
        const name = nameInput.value.trim();
        const dobValue = dobInput.value;
        
        // Reset view if fields are empty
        if (!name && !dobValue) {
            resultBox.style.display = 'none';
            grid.innerHTML = '';
            return;
        }

        // Keep content clean during quick typing switches
        grid.innerHTML = '';

        // 1. Live Name Processing
        if (name) {
            greeting.innerText = `Results for: ${name}`;
            const nameNum = getNameNumberAlphanumeric(name);
            
            grid.innerHTML += `
                <div class="num-item">
                    <p>Name Number (Total Value)</p>
                    <span>${nameNum}</span>
                </div>
            `;
        } else {
            greeting.innerText = `Results`;
        }

        // 2. Live DOB Processing
        if (dobValue) {
            // Split manually to avoid timezone shifting issues inherent to native Date parsing strings
            const dateParts = dobValue.split('-'); 
            if (dateParts.length === 3) {
                const day = parseInt(dateParts[2], 10);
                const month = parseInt(dateParts[1], 10);
                const year = parseInt(dateParts[0], 10);

                const mulank = getSingleDigit(day);
                const totalSum = day + month + year;
                const bhagyaank = getSingleDigit(totalSum);

                grid.innerHTML += `
                    <div class="num-item">
                        <p>Mulank (Psychic Number)</p>
                        <span>${mulank}</span>
                    </div>
                    <div class="num-item">
                        <p>Bhagyaank (Destiny Number)</p>
                        <span>${bhagyaank}</span>
                    </div>
                `;
            }
        }

        // Make card visible 
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
