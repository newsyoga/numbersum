<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #4a5568;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
        }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #5a67d8;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 5px solid #764ba2;
            display: none;
        }
        .result h3 {
            margin: 0 0 15px 0;
            color: #2d3748;
        }
        .number-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .num-item {
            background: #edf2f7;
            padding: 12px;
            border-radius: 6px;
        }
        .num-item p {
            margin: 0;
            font-size: 14px;
            color: #4a5568;
            font-weight: 600;
        }
        .num-item span {
            display: block;
            font-size: 26px;
            font-weight: bold;
            color: #764ba2;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Numerology Calculator</h1>
    
    <div class="form-group">
        <label for="name">Name (Optional):</label>
        <input type="text" id="name" placeholder="Enter name">
    </div>
    
    <div class="form-group">
        <label for="dob">Date of Birth (Optional):</label>
        <input type="date" id="dob">
    </div>
    
    <button onclick="calculateNumerology()">Calculate</button>
    
    <div class="result" id="resultBox">
        <h3 id="greeting">Results</h3>
        <div class="number-grid" id="numberGrid">
            <!-- Dynamic result cards will appear here -->
        </div>
    </div>
</div>

<script>
    // Helper function to reduce any number to a single digit (1-9)
    function getSingleDigit(num) {
        while (num > 9) {
            let sum = 0;
            while (num > 0) {
                sum += num % 10;
                num = Math.floor(num / 10);
            }
            num = sum;
        }
        return num;
    }

    // Function to calculate Pythagorean value of a name string
    function getNameNumber(name) {
        const cleanName = name.toUpperCase().replace(/[^A-Z]/g, '');
        let total = 0;
        
        for (let i = 0; i < cleanName.length; i++) {
            // A=1, B=2... I=9, J=1, K=2...
            let code = cleanName.charCodeAt(i) - 64; 
            let val = code % 9 === 0 ? 9 : code % 9;
            total += val;
        }
        return getSingleDigit(total);
    }

    function calculateNumerology() {
        const name = document.getElementById('name').value.trim();
        const dobInput = document.getElementById('dob').value;
        const grid = document.getElementById('numberGrid');
        
        // Clear previous results
        grid.innerHTML = '';

        if (!name && !dobInput) {
            alert("Please enter at least a Name or a Date of Birth!");
            return;
        }

        // 1. Process Name if provided
        if (name) {
            document.getElementById('greeting').innerText = `Results for: ${name}`;
            const nameNum = getNameNumber(name);
            
            grid.innerHTML += `
                <div class="num-item">
                    <p>Name Number (Total Letters)</p>
                    <span>${nameNum}</span>
                </div>
            `;
        } else {
            document.getElementById('greeting').innerText = `Results`;
        }

        // 2. Process DOB if provided
        if (dobInput) {
            const dateObj = new Date(dobInput);
            const day = dateObj.getDate();
            const month = dateObj.getMonth() + 1;
            const year = dateObj.getFullYear();

            // Mulank (Single digit of the birth Day)
            const mulank = getSingleDigit(day);

            // Bhagyaank (Single digit of Day + Month + Year)
            const totalSum = day + month + year;
            const bhagyaank = getSingleDigit(totalSum);

            grid.innerHTML += `
                <div class="num-item">
                    <p>Mulank (Psychic Number)</p>
                    <span>${mulank}</span>
                </div>
                <div class="num-item">
                    <p>Bhagyaank (Destiny Number)</p>
                    <span>${bhagyaank}</span>
                </div>
            `;
        }

        // Display Results box
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
